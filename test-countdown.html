<!DOCTYPE html>
<html>
<head>
    <title>Countdown Test</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #1a1a1a; color: white; }
        .container { max-width: 600px; margin: 0 auto; background: #2a2a2a; padding: 20px; border-radius: 10px; }
        input { width: 100%; padding: 10px; margin: 10px 0; font-size: 16px; border-radius: 5px; border: none; }
        button { width: 100%; padding: 15px; font-size: 18px; background: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #45a049; }
        .result { margin-top: 20px; padding: 15px; background: #333; border-radius: 5px; white-space: pre-wrap; }
        .error { background: #d32f2f; }
        .success { background: #388e3c; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔥 Countdown API Test</h1>
        
        <label>Supabase Anon Key:</label>
        <input type="text" id="anonKey" placeholder="eyJhbGciOiJIUzI1NiIs...">
        
        <label>Order ID:</label>
        <input type="text" id="orderId" placeholder="e.g., 0d6067f6-998c-4744-a724-10107b8438eb">
        
        <button onclick="testCountdown()">Test Get Countdown Status</button>
        
        <div id="result" class="result" style="display:none;"></div>
    </div>

    <script>
        async function testCountdown() {
            const anonKey = document.getElementById('anonKey').value;
            const orderId = document.getElementById('orderId').value;
            const resultDiv = document.getElementById('result');
            
            if (!anonKey || !orderId) {
                resultDiv.style.display = 'block';
                resultDiv.className = 'result error';
                resultDiv.textContent = 'Please fill in both fields!';
                return;
            }
            
            resultDiv.style.display = 'block';
            resultDiv.className = 'result';
            resultDiv.textContent = 'Testing...';
            
            try {
                const response = await fetch('https://msbthxbmpwskializgaa.supabase.co/functions/v1/countdown', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${anonKey}`
                    },
                    body: JSON.stringify({
                        action: 'get_countdown_status',
                        order_id: orderId
                    })
                });
                
                const data = await response.json();
                
                resultDiv.className = 'result success';
                resultDiv.innerHTML = `<strong>✅ SUCCESS!</strong>\n\n${JSON.stringify(data, null, 2)}`;
                
                // If countdown is active, show timer
                if (data.countdown?.active) {
                    startTimer(data.countdown.time_remaining_seconds);
                }
                
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = `<strong>❌ ERROR:</strong>\n${error.message}`;
            }
        }
        
        function startTimer(seconds) {
            const resultDiv = document.getElementById('result');
            let remaining = seconds;
            
            const timerDiv = document.createElement('div');
            timerDiv.style.cssText = 'margin-top: 20px; padding: 15px; background: #ff5722; border-radius: 5px; font-size: 24px; text-align: center;';
            resultDiv.appendChild(timerDiv);
            
            const interval = setInterval(() => {
                remaining--;
                timerDiv.innerHTML = `<strong>⏱️ ${remaining}s remaining</strong>`;
                
                if (remaining <= 0) {
                    clearInterval(interval);
                    timerDiv.innerHTML = '<strong>⏰ TIMEOUT!</strong>';
                    timerDiv.style.background = '#d32f2f';
                }
            }, 1000);
        }
    </script>
</body>
</html>
